<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Lander - Checkout</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .checkout-container { background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .order-summary { background-color: #f9f9f9; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #007bff; }
        .order-summary p { margin: 5px 0; color: #555; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .form-row { display: flex; gap: 10px; }
        .btn-pay { background-color: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-pay:hover { background-color: #218838; }
        .message { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Secure Checkout</h2>
    
    <div class="order-summary">
        <p><strong>Item:</strong> Premium Dream Package</p>
        <p><strong>Total Amount:</strong> ₹10,000.00</p>
    </div>

    <form id="payment-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" value="tester@example.com" required>
        </div>

        <div class="form-group">
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" value="4242424242424242" placeholder="4242 4242 4242 4242" required>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label for="expiry">Expiry Date</label>
                <input type="text" id="expiry" value="12/29" placeholder="MM/YY" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="cvv">CVV</label>
                <input type="password" id="cvv" value="123" placeholder="123" required>
            </div>
        </div>

        <button type="submit" class="btn-pay" id="pay-button">Pay ₹10,000.00</button>
    </form>

    <div id="status-message" class="message"></div>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/dashboard" style="color: #666; text-decoration: none; font-size: 14px;">
            📊 Open Live Payment Dashboard
        </a>
    </div>
</div>

<script src="js/checkout.js"></script>
</body>
</html>
